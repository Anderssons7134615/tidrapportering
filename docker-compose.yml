version: '3.8'

services:
  # PostgreSQL databas
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: tidapp
      POSTGRES_PASSWORD: tidapp123
      POSTGRES_DB: tidapp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://tidapp:tidapp123@db:5432/tidapp
      - JWT_SECRET=super-secret-jwt-key-change-in-production-min-32-chars
      - PORT=3001
      - UPLOAD_DIR=/app/uploads
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
